linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment # too strict for most TUIs
  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true
  revive:
    enable-all-rules: true
    rules:
      - name: argument-limit
        disabled: true
      - name: function-result-limit
        disabled: true
      - name: cyclomatic
        disabled: true
      - name: cognitive-complexity
        disabled: true
      - name: max-public-structs
        disabled: true
      - name: file-header
        disabled: true
      - name: line-length-limit
        disabled: true
      - name: function-length
        disabled: true
      - name: add-constant
        disabled: true
      - name: empty-lines
        disabled: true
  gosec:
    config:
      G306: "0600"
      G302: "0600"
  staticcheck:
    checks: ["all"]

linters:
  enable-all: true
  disable:
    - gocyclo    # complexity
    - lll        # line length
    - nestif     # nested if
    - dupl       # sometimes duplicate code is clearer in tests
    - wsl        # too opinionated on whitespace
    - nlreturn   # too opinionated on newlines before return
    - exhaustruct # too strict for TUI models
    - varnamelen # short names are idiomatic in Go
    - wrapcheck  # can be noisy
    - paralleltest # not always needed
    - tparallel
    - forbidigo  # depends on project
    - gochecknoglobals
    - gochecknoinits
    - tagalign
    - nonamedreturns
    - interfacebloat
    - ireturn
    - depguard
    - err113
    - tenv
    - unparam
    - contextcheck
    - testpackage
    - errcheck
    - gocognit
    - stylecheck
    - goconst
